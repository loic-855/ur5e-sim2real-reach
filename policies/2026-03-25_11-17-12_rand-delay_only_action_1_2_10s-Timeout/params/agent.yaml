!!python/object:Woodworking_Simulation.tasks.direct.pose_orientation_sim2real_v1.agents.rsl_rl_ppo_cfg.PPORunnerCfg
seed: 42
device: cuda:0
num_steps_per_env: 512
max_iterations: 1500
empirical_normalization: null
obs_groups:
  policy:
  - policy
  critic:
  - policy
clip_actions: null
save_interval: 50
experiment_name: sim2real_v1_ablation
run_name: rand-delay_only_action_1_2_10s-Timeout
logger: wandb
neptune_project: isaaclab
wandb_project: sim2real_v1_ablation
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
policy: !!python/object:isaaclab_rl.rsl_rl.rl_cfg.RslRlPpoActorCriticCfg
  class_name: ActorCritic
  init_noise_std: 1.0
  noise_std_type: scalar
  state_dependent_std: false
  actor_obs_normalization: false
  critic_obs_normalization: false
  actor_hidden_dims:
  - 256
  - 128
  - 64
  critic_hidden_dims:
  - 256
  - 128
  - 64
  activation: elu
algorithm: !!python/object:isaaclab_rl.rsl_rl.rl_cfg.RslRlPpoAlgorithmCfg
  class_name: PPO
  num_learning_epochs: 8
  num_mini_batches: 8
  learning_rate: 0.0005
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.0
  desired_kl: 0.008
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  rnd_cfg: null
  symmetry_cfg: null
monitor_gym: true

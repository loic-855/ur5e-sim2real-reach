# ============================================================================
# Hyperparameter Sweep: Domain Randomization Ablation Study
# ============================================================================
# Task: WWSim-Pose-Orientation-Sim2Real-Direct-v2
# Sweep: 5 binary dimensions of domain randomization
# Grid: 2 × 2 × 2 × 2 × 2 = 32 runs
# WandB: project=sim2real, experiment_name=sim2real_v2_rand
#
# Tests all combinations of:
#   - action_delay (enabled/disabled)
#   - action_noise (enabled/disabled)
#   - observation_delay (enabled/disabled)
#   - observation_noise (enabled/disabled)
#   - actuator_randomization (stiffness/damping/friction, enabled/disabled)
#
# Usage:  python euler/generate_sweep.py --config euler/sweep_sim2real_v2_rand.yaml --submit
# ============================================================================

task_name: "WWSim-Pose-Orientation-Sim2Real-Direct-v2"

# --- SLURM settings ---
slurm:
  time_per_task: "00:35:00"  # ~30-35 min per run
  gpus: "rtx_4090:1"
  cpus_per_task: 2
  mem_per_cpu: 8000
  nodes: 2  

# Overrides applied to EVERY run
base_overrides:
  - "agent.max_iterations=2500"
  - "agent.wandb_project=sim2real_v2_rand_delay"
  - "agent.experiment_name=sim2real_v2_rand_delay"
  - "env.domain_rand.enabled=True" 
  - "env.position_exp_scale=0.2"
  - "env.orientation_exp_scale=0.4"

# ============================================================================
# Sweep Dimensions (Cartesian Product → 7 x 3 = 21 runs)
# ============================================================================

dimensions:

  # -------------------------------------------------------------------
  # Action Delay Randomization
  # Controls action_delay_range in domain randomization
  # -------------------------------------------------------------------
  action_delay:
    off:
      - "env.domain_rand.action_delay_range=[0,0]"
      - "env.domain_rand.obs_delay_range=[0,0]"
    low:
      - "env.domain_rand.action_delay_range=[1,1]"
      - "env.domain_rand.obs_delay_range=[1,1]"
    mid:
      - "env.domain_rand.action_delay_range=[2,2]"
      - "env.domain_rand.obs_delay_range=[2,2]"
    high:
      - "env.domain_rand.action_delay_range=[3,3]"
      - "env.domain_rand.obs_delay_range=[3,3]"
    var1:
      - "env.domain_rand.action_delay_range=[1,2]"
      - "env.domain_rand.obs_delay_range=[1,2]"
    var2:
      - "env.domain_rand.action_delay_range=[2,3]"
      - "env.domain_rand.obs_delay_range=[2,3]"
    var3:
      - "env.domain_rand.action_delay_range=[1,3]"
      - "env.domain_rand.obs_delay_range=[1,3]"



  # -------------------------------------------------------------------
  # Action scale
  # Controls action scale
  # -------------------------------------------------------------------
  action_scale :
    low:
    - "env.action_scale=0.2"
    medium:
    - "env.action_scale=0.4"
    high:
    - "env.action_scale=0.7"
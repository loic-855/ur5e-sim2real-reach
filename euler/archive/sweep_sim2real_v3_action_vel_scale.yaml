# ============================================================================
# Hyperparameter Sweep: Sim2Real v3 Base Optimization
# ============================================================================
# Task: WWSim-Pose-Orientation-Sim2Real-Direct-v3
# Sweep: position_exp_scale orientation_exp_scale x dof_velocity_scale
# Grid: 3 × 3 x3 = 27 runs
# WandB: project=sim2real_v3_action_vel_scale, experiment_name=sim2real_v3_action_vel_scale
#
# Usage:  python euler/generate_sweep.py --config euler/sweep_sim2real_v3_action_vel_scale.yaml --submit
# ============================================================================

task_name: "WWSim-Pose-Orientation-Sim2Real-Direct-v3"

# --- SLURM settings ---
slurm:
  time_per_task: "00:35:00"  # ~30-35 min per run
  gpus: "rtx_4090:1"
  cpus_per_task: 2
  mem_per_cpu: 8000
  nodes: 1  

# Overrides applied to EVERY run
base_overrides:
  - "agent.max_iterations=2500"
  - "agent.wandb_project=sim2real_v3_action_vel_scale"
  - "agent.experiment_name=sim2real_v3_action_vel_scale"
  - "env.domain_rand.enabled=True" 
  - "env.position_exp_scale=0.2"
  - "env.orientation_exp_scale=0.4"
  - "env.domain_rand.action_delay_range=[0,0]"
  - "env.domain_rand.obs_delay_range=[0,0]"
  #domain rand is active for noise only, but we keep it off for delays in this sweep to isolate the effect of delay randomization

# ============================================================================
# Sweep Dimensions (Cartesian Product → 3 × 3 x 3 = 27 runs)
# ============================================================================

dimensions:

  # -------------------------------------------------------------------
  # Action scale
  # -------------------------------------------------------------------
  action_scale:
    low:
      - "env.action_scale=2.0"
    medium:
      - "env.action_scale=3.0"
    high:
      - "env.action_scale=4.0"

  # -------------------------------------------------------------------
  # Velocity scale
  # -------------------------------------------------------------------
  velocity_scale:
    low:
      - "env.velocity_scale=0.5"
    medium:
      - "env.velocity_scale=1.0"
    high:
      - "env.velocity_scale=1.5"
    high2:
      - "env.velocity_scale=2.0"


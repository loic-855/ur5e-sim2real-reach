# Ablation sweep for sim2real v1
# 7 runs: no DR, all DR, and single-parameter toggles (including two delay variants)
# Overrides are written as full hydra-style strings per-line to match other sweeps.
# Usage:  python euler/generate_sweep.py --config euler/sweep_sim2real_v1_ablation.yaml --submit
# ============================================================================

task_name: "WWSim-Pose-Orientation-Sim2Real-Direct-v1"

# --- SLURM settings ---
slurm:
  time_per_task: "07:00:00"
  cpus_per_task: 4
  mem_per_cpu: 6000
  nodes: 3

# Overrides applied to EVERY run
base_overrides:
  - "agent.max_iterations=1500"
  - "agent.wandb_project=sim2real_v1_ablation"
  - "agent.experiment_name=sim2real_v1_ablation"


dimensions:
  rand:
    off:
      - "env.domain_rand.enable_actuator_rand=False"
      - "env.domain_rand.enable_mass_com_rand=False"
      - "env.domain_rand.enable_noise=False"
      - "env.domain_rand.enable_delay=False"
      - "env.domain_rand.action_delay_range=[0,0]"
      - "env.domain_rand.obs_delay_range=[0,0]"

    all_enabled:
      - "env.domain_rand.enable_actuator_rand=True"
      - "env.domain_rand.enable_mass_com_rand=True"
      - "env.domain_rand.enable_noise=True"
      - "env.domain_rand.enable_delay=True"
      - "env.domain_rand.action_delay_range=[1,2]"
      - "env.domain_rand.obs_delay_range=[0,1]"

    actuator_only:
      - "env.domain_rand.enable_actuator_rand=True"
      - "env.domain_rand.enable_mass_com_rand=False"
      - "env.domain_rand.enable_noise=False"
      - "env.domain_rand.enable_delay=False"
      - "env.domain_rand.action_delay_range=[0,0]"
      - "env.domain_rand.obs_delay_range=[0,0]"

    masscom_only:
      - "env.domain_rand.enable_actuator_rand=False"
      - "env.domain_rand.enable_mass_com_rand=True"
      - "env.domain_rand.enable_noise=False"
      - "env.domain_rand.enable_delay=False"
      - "env.domain_rand.action_delay_range=[0,0]"
      - "env.domain_rand.obs_delay_range=[0,0]"

    noise_only:
      - "env.domain_rand.enable_actuator_rand=False"
      - "env.domain_rand.enable_mass_com_rand=False"
      - "env.domain_rand.enable_noise=True"
      - "env.domain_rand.enable_delay=False"
      - "env.domain_rand.action_delay_range=[0,0]"
      - "env.domain_rand.obs_delay_range=[0,0]"

    delay_only_action_1_2:
      - "env.domain_rand.enable_actuator_rand=False"
      - "env.domain_rand.enable_mass_com_rand=False"
      - "env.domain_rand.enable_noise=False"
      - "env.domain_rand.enable_delay=True"
      - "env.domain_rand.action_delay_range=[1,2]"
      - "env.domain_rand.obs_delay_range=[0,1]"

    delay_only_action_0_1:
      - "env.domain_rand.enable_actuator_rand=False"
      - "env.domain_rand.enable_mass_com_rand=False"
      - "env.domain_rand.enable_noise=False"
      - "env.domain_rand.enable_delay=True"
      - "env.domain_rand.action_delay_range=[0,1]"
      - "env.domain_rand.obs_delay_range=[0,1]"

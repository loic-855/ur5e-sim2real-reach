# Ablation sweep for sim2real v3
# 7 runs: no DR, all DR, and single-parameter toggles (including two delay variants)
# Each entry describes the domain randomization toggles and delay ranges.
#
# Usage:  python euler/generate_sweep.py --config euler/sweep_sim2real_v1_ablation.yaml --submit
# ============================================================================

task_name: "WWSim-Pose-Orientation-Sim2Real-Direct-v1"

# --- SLURM settings ---
slurm:
  time_per_task: "07:00:00"
  cpus_per_task: 4
  mem_per_cpu: 6000
  nodes: 3  

# Overrides applied to EVERY run
base_overrides:
  - "agent.max_iterations=1500"
  - "agent.wandb_project=sim2real_v1_ablation"
  - "agent.experiment_name=sim2real_v1_ablation"


sweep_name: sim2real_v1_ablation
runs:
  - name: all_disabled
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: False
          enable_mass_com_rand: False
          enable_noise: False
          enable_delay: False
          action_delay_range: [0,0]
          obs_delay_range: [0,0]

  - name: all_enabled
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: True
          enable_mass_com_rand: True
          enable_noise: True
          enable_delay: True
          action_delay_range: [1,2]
          obs_delay_range: [0,1]

  - name: actuator_only
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: True
          enable_mass_com_rand: False
          enable_noise: False
          enable_delay: False
          action_delay_range: [0,0]
          obs_delay_range: [0,0]

  - name: masscom_only
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: False
          enable_mass_com_rand: True
          enable_noise: False
          enable_delay: False
          action_delay_range: [0,0]
          obs_delay_range: [0,0]

  - name: noise_only
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: False
          enable_mass_com_rand: False
          enable_noise: True
          enable_delay: False
          action_delay_range: [0,0]
          obs_delay_range: [0,0]

  - name: delay_only_action_1_2
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: False
          enable_mass_com_rand: False
          enable_noise: False
          enable_delay: True
          action_delay_range: [1,2]
          obs_delay_range: [0,1]

  - name: delay_only_action_0_1
    overrides:
      env:
        domain_rand:
          enable_actuator_rand: False
          enable_mass_com_rand: False
          enable_noise: False
          enable_delay: True
          action_delay_range: [0,1]
          obs_delay_range: [0,1]

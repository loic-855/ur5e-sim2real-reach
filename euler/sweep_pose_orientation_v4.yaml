# ============================================================================
# Hyperparameter Sweep: Domain Randomization (V4)
# ============================================================================
# Pose-Orientation Sim2Real V4 with Domain Randomization variants
# 
# Grid: 2 (noise) × 3 (action delay) × 2 (obs delay) × 2 (penalties) = 24 runs
#
# Usage:  python euler/generate_sweep.py --config euler/sweep_pose_orientation_v4.yaml --submit
# ============================================================================

task_name: "WWSim-Pose-Orientation-Sim2Real-Direct-v4"

# --- SLURM settings ---
slurm:
  time_per_task: "00:35:00"  # ~30-35 min per run
  gpus: "rtx_4090:1"
  cpus_per_task: 2
  mem_per_cpu: 8000
  nodes: 2  

# Overrides applied to EVERY run
base_overrides:
  - "agent.max_iterations=2500"

# ============================================================================
# Sweep Dimensions (Cartesian Product)
# ============================================================================
# Total combinations: 2 × 3 × 2 × 2 = 24 runs

dimensions:

  # -------------------------------------------------------------------
  # Domain Randomization: Observation + Action Noise Only
  # -------------------------------------------------------------------
  # no_noise: Disables action & observation noise only (keeps delays & actuator randomization)
  # with_noise: Enables realistic observation + action noise
  # Both keep: action/obs delays and actuator (stiffness/damping) randomization
  noise_config:
    no_noise:
      - "env.domain_rand.enabled=true"
      - "env.domain_rand.action_noise_std_pos=0.0"
      - "env.domain_rand.action_noise_std_vel=0.0"
      - "env.domain_rand.obs_noise_std_pos=0.0"
      - "env.domain_rand.obs_noise_std_quat=0.0"
      - "env.domain_rand.obs_noise_std_joint_pos=0.0"
      - "env.domain_rand.obs_noise_std_joint_vel=0.0"
    with_noise:
      - "env.domain_rand.enabled=true"
      - "env.domain_rand.action_noise_std_pos=0.025"
      - "env.domain_rand.action_noise_std_vel=0.01"
      - "env.domain_rand.obs_noise_std_pos=0.005"
      - "env.domain_rand.obs_noise_std_quat=0.025"
      - "env.domain_rand.obs_noise_std_joint_pos=0.012"
      - "env.domain_rand.obs_noise_std_joint_vel=0.025"

  # -------------------------------------------------------------------
  # Action Delay Range (decimated steps)
  # -------------------------------------------------------------------
  # Simulates different communication latencies
  action_delay:
    minimal:
      - "env.domain_rand.action_delay_range=[0,1]"
    moderate:
      - "env.domain_rand.action_delay_range=[1,2]"
    high:
      - "env.domain_rand.action_delay_range=[0,2]"

  # -------------------------------------------------------------------
  # Observation Delay Range (decimated steps)
  # -------------------------------------------------------------------
  # Simulates sensor latency
  obs_delay:
    minimal:
      - "env.domain_rand.obs_delay_range=[0,1]"
    constant:
      - "env.domain_rand.obs_delay_range=[1,1]"

  # -------------------------------------------------------------------
  # Action & Velocity Penalty Scales
  # -------------------------------------------------------------------
  # Two distinct penalty profiles:
  # - high: -0.01, -0.05, -0.01  (strong discouragement of unnecessary actions)
  # - low:  -0.005, -0.025, -0.005 (gentler penalties, encourage exploration)
  penalty_profile:
    high:
      - "env.action_penalty_scale=-0.01"
      - "env.velocity_action_penalty_scale=-0.05"
      - "env.velocity_penalty_scale=-0.01"
    low:
      - "env.action_penalty_scale=-0.005"
      - "env.velocity_action_penalty_scale=-0.025"
      - "env.velocity_penalty_scale=-0.005"
